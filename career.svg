  <circle cx="72" cy="90" r="7" fill="#0d0818" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
  <text x="100" y="88" font-family="Courier New, monospace" font-size="12" fill="#7a4a9a" letter-spacing="2">[2021]</text>
  <text x="100" y="110" font-family="Courier New, monospace" font-weight="700" font-size="16" fill="#e0c8ff">INIT: Started learning to code</text>
  <text x="100" y="132" font-family="Courier New, monospace" font-size="13" fill="#7a6a90">Self-taught. No bootcamp, no degree — just curiosity and persistence.</text>

