  <text x="100" y="316" font-family="Courier New, monospace" font-size="13" fill="#7a6a90">Developing &amp; maintaining financial-grade systems in Corporate &amp; Investment Banking.</text>
  <text x="100" y="336" font-family="Courier New, monospace" font-size="13" fill="#7a6a90">Working on legacy infrastructure where context is scarce and problem-solving is daily.</text>

